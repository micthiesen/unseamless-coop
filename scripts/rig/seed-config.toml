# unseamless-coop — rig test seed config.
#
# `scripts/rig.sh apply` copies this to <Game>/unseamless-coop/unseamless_coop.toml so rig runs
# start from a known, reproducible config instead of the random-password default the mod writes on
# first launch. Edit freely; `apply --keep-config` leaves an existing on-disk config untouched.
#
# The one load-bearing choice here is [debug].enabled = true: it drops logging to `level` so a rig
# run captures the verbose lines (CLAUDE.md's logging rule keeps these silent by default). The
# password is a throwaway test value — co-op isn't wired up yet, but the mod rejects a password
# shorter than 5 chars at startup, so it must be set to *something* valid.

[gameplay]
crit_coop = true
death_debuffs = true
allow_summons = true
roam_anywhere = true
overhead_display = "normal"
skip_splash_screens = true
append_steam_id = false
always_spectate_on_death = false
# On (vs the shipped default of off) so a rig run actually exercises the boot-volume write path — it's
# the only verification surface for coop/features/boot_volume (the cdylib logic can't be host-tested).
boot_master_volume_enabled = true
boot_master_volume = 5

[scaling]
enemy_health = 35
enemy_damage = 0
enemy_posture = 15
boss_health = 100
boss_damage = 0
boss_posture = 20

[session]
password = "coop-test"
# Relax the session player cap (vanilla 4 open world / 6 arena) via session_player_limit_override.
max_players = 6

[save]
# Rig testing uses a DISTINCT extension on purpose: this machine's real ERSC co-op character lives in
# ER0000.co2 (ERSC's default, which is also our shipped default), and we don't want an in-development
# build reading/writing that 28MB save. ER0000.uco isolates every rig run from it. The shipped default
# stays "co2"; only this rig seed diverges.
file_extension = "uco"

[language]
override = ""

[loader]
# Our dinput8.dll is the parent loader; it loads DLLs from mods/ (which `apply` controls via
# --with-mods). Default apply leaves mods/ empty, so this logs "no extra mods" — clean observation.
enabled = true
order = []

[debug]
enabled = true
level = "debug"
forward_to_host = false
# Dev side-channel bridge on loopback (diag/rig builds only). Drive it from the host with:
#   scripts/harness.sh bridge-host 47700
bridge_port = 47700
# In-game overlay (on by default). Recovery kill-switch: set false and relaunch to run without it if
# the DX12 present-hook ever misbehaves under Proton/vkd3d.
overlay = true

# Requestable diagnostic probes — all off by default. Flip on demand when chasing a specific issue
# (yourself on the rig, or ask a friend tester to set one, reproduce, and send the log). A full
# snapshot already logs at boot + on any feature panic regardless of these.
[debug.probes]
snapshot_secs = 0          # >0: also log a full diagnostic snapshot every N seconds
event_flag_scan_start = 0  # event-flag scanner window start...
event_flag_scan_count = 0  # ...and how many flags to watch (0 = off). Finds the flag behind an action
                           # (e.g. set a window, rest at a grace, see which flag flips = the cure flag).
session_probe = false      # rung-3 RE: log every session lobby/protocol FSM transition + (once charted)
                           # hook the create/join initiation, all under the `session-probe:` log prefix.
                           # Flip true for a two-player create/join RE run — see docs/SESSION-RE-RUNBOOK.md.
lobby_callback_probe = true # rung-4 gate: register one private CreateLobby call-result and log (under
                           # `lobby-probe:`) whether it fires under ER's Steam pump. FIRED => RunCallbacks,
                           # lobby discovery viable; never fires => ManualDispatch, rung-4 blocked. Solo.

# Death-debuff stacking tuning (the on/off toggle is gameplay.death_debuffs). Each death adds the next
# tier up to max_tiers; deaths past that intensify potency by intensity_step_percent each, capped at
# max_intensity_percent. These are the defaults, here for visibility while we RE the death/grace signals.
[death_debuffs]
max_tiers = 5
intensify_past_cap = true
intensity_step_percent = 50
max_intensity_percent = 300

# Lock the in-game time of day (a permanent day/night setting). Off by default; flip `lock` and pick
# hour/minute (also adjustable live in the overlay menu). Handy for solo testing.
[world_time]
lock = false
hour = 12
minute = 0
