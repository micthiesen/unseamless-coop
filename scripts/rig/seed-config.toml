# unseamless-coop — rig test seed config.
#
# `scripts/rig.sh apply` copies this to <Game>/unseamless-coop/unseamless_coop.toml so rig runs
# start from a known, reproducible config instead of the random-password default the mod writes on
# first launch. Edit freely; `apply --keep-config` leaves an existing on-disk config untouched.
#
# The one load-bearing choice here is [debug].enabled = true: it drops logging to `level` so a rig
# run captures the verbose lines (CLAUDE.md's logging rule keeps these silent by default). The
# [session].password is now the co-op trigger: with it set, lobby discovery runs on launch (creates a
# lobby + becomes host solo, finds + joins a partner's with two players), so a rig run exercises the
# real connection path. It must be 5+ chars (the mod rejects a shorter one at startup).

[gameplay]
crit_coop = true
death_debuffs = true
allow_summons = true
roam_anywhere = true
overhead_display = "normal"
skip_splash_screens = true
# Re-enable the online multiplayer items offline (the rung-3 unblock). Listed explicitly because a rig
# run is the only way to verify the boot-time "is offline" code patch — confirm the items ungrey and no
# network-error popup fires. See docs/OFFLINE-ITEMS-FINDINGS.md > "Rig verification recipe".
enable_offline_multiplayer = true
# EXPERIMENTAL / UNVERIFIED item-gate candidate (forces the game's IsEnableOnlineMode() getter true via
# a boot patch). Listed here so the lever is discoverable, but left OFF: the recipe says do the cheap
# live read of 0x144588afc FIRST — only flip this true to test if that read shows the getter is false
# outside EAC. See docs/OFFLINE-ITEMS-FINDINGS.md > "Item-gate follow-up pass".
force_online_menu_mode = false
# EXPERIMENTAL / UNVERIFIED rung-3 lever. A direct create returns false offline because the create/join
# inners call a shared Arxan-encrypted availability gate (0x140cb4b50) before building params and bail to
# FailedToCreate/FailedToJoin. This patches the create call site so the gate's veto is ignored, letting
# create proceed to the network create. Left OFF: do the runtime-verify FIRST (write-watch on [G]+0x24 to
# see whether the gate or the network create is the reject). See docs/SESSION-DRIVE.md > "Why a direct
# create fails offline".
bypass_session_create_gate = false
append_steam_id = false
always_spectate_on_death = false
# On (vs the shipped default of off) so a rig run actually exercises the boot-volume write path — it's
# the only verification surface for coop/features/boot_volume (the cdylib logic can't be host-tested).
boot_master_volume_enabled = true
boot_master_volume = 5

[scaling]
enemy_health = 35
enemy_damage = 0
enemy_posture = 15
boss_health = 100
boss_damage = 0
boss_posture = 20

[session]
password = "coop-test"
# Relax the session player cap (vanilla 4 open world / 6 arena) via session_player_limit_override.
max_players = 6

[save]
# Rig testing uses a DISTINCT extension on purpose: this machine's real ERSC co-op character lives in
# ER0000.co2 (ERSC's default, which is also our shipped default), and we don't want an in-development
# build reading/writing that 28MB save. ER0000.uco isolates every rig run from it. The shipped default
# stays "co2"; only this rig seed diverges.
file_extension = "uco"

[language]
override = ""

[loader]
# Our dinput8.dll is the parent loader; it loads DLLs from mods/ (which `apply` controls via
# --with-mods). Default apply leaves mods/ empty, so this logs "no extra mods" — clean observation.
enabled = true
order = []

[debug]
enabled = true
level = "debug"
forward_to_host = false
# Dev side-channel bridge on loopback (diag/rig builds only). Drive it from the host with:
#   scripts/harness.sh bridge-host 47700
bridge_port = 47700
# In-game overlay (on by default). Recovery kill-switch: set false and relaunch to run without it if
# the DX12 present-hook ever misbehaves under Proton/vkd3d.
overlay = true
# In-overlay rig-testing GUIDE: a pinned, on-screen sequence of test steps that walks the tester
# through a run (so the orchestrator doesn't round-trip "do X, now do Y"). Empty = off. Debug-only
# (diag/dev builds; stripped from release). When validating something SPECIFIC — solo, on the rig, or
# in a friend/prerelease bundle — set this to the relevant guide so the tester(s) AND you follow the
# same steps. Committed guides: "rung3-create-chart" (create-session RE; pair with session_probe = true
# below), "overlay-smoke" (guide self-test), "two-player-join" (role-tagged 2-player). See
# docs/RIG-GUIDES.md; author new ones per the rig-guides skill.
guide = ""
# Which role this machine plays for an active `guide`: "host" / "join" / "solo" (default "solo"). One
# shared guide runs on every machine; each shows only the steps tagged for its role. For a two-player
# guide set "host" on the hosting machine and "join" on the joiner.
rig_role = "solo"

# Requestable diagnostic probes — all off by default. Flip on demand when chasing a specific issue
# (yourself on the rig, or ask a friend tester to set one, reproduce, and send the log). A full
# snapshot already logs at boot + on any feature panic regardless of these.
[debug.probes]
snapshot_secs = 20         # >0: also log a full diagnostic snapshot every N seconds (surfaces the
                           # `coop_connect` per-stage report so a discovery run is legible in the log)
event_flag_scan_start = 0  # event-flag scanner window start...
event_flag_scan_count = 0  # ...and how many flags to watch (0 = off). Finds the flag behind an action
                           # (e.g. set a window, rest at a grace, see which flag flips = the cure flag).
session_probe = false      # rung-3 RE: log every session lobby/protocol FSM transition + (once charted)
                           # hook the create/join initiation, all under the `session-probe:` log prefix.
                           # Flip true for a two-player create/join RE run — see docs/SESSION-RE-RUNBOOK.md.
lobby_callback_probe = false # rung-4 re-derivation probe (poll one private CreateLobby via ISteamUtils).
                           # Its question is settled (ER pumps RunCallbacks; CreateLobby works), and the
                           # real discovery driver now runs whenever a password is set, so leave it off
                           # unless re-deriving after a game/Steam update.
drive_create = false       # EXPERIMENTAL rung-3 direct-drive: once in-game with lobby_state=None, CALL the
                           # charted create-session fn on [G] (no item, no peer) and log whether lobby_state
                           # moves to TryToCreateSession. Pair with gameplay.enable_offline_multiplayer = true
                           # (the create builder calls is_offline twice). See docs/SESSION-DRIVE.md.
force_netsession_ready = false # rung-3 reject-#1 lever (pairs with drive_create): write NetworkSession+0x10
                           # nonzero before the driven create to satisfy leg B's first reject. RIG-PROVEN
                           # INSUFFICIENT (the blocker is deeper — the 0x144842d40 online service); kept as a
                           # charted probe. Logs the flag's pre-call value either way. See docs/SESSION-DRIVE.md.

# Death-debuff stacking tuning (the on/off toggle is gameplay.death_debuffs). Each death adds the next
# tier up to max_tiers; deaths past that intensify potency by intensity_step_percent each, capped at
# max_intensity_percent. These are the defaults, here for visibility while we RE the death/grace signals.
[death_debuffs]
max_tiers = 5
intensify_past_cap = true
intensity_step_percent = 50
max_intensity_percent = 300

# Lock the in-game time of day (a permanent day/night setting). Off by default; flip `lock` and pick
# hour/minute (also adjustable live in the overlay menu). Handy for solo testing.
[world_time]
lock = false
hour = 12
minute = 0
