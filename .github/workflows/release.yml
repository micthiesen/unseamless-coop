name: release

# Cut a release only when a version tag is pushed (not on every push).
# Create an annotated vX.Y.Z tag whose message becomes the release notes (--notes-from-tag).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Set up Rust toolchain
        # rust-toolchain.toml pins the channel; ensure the cross target is present.
        run: |
          rustup show
          rustup target add x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Check tag matches workspace version
        # Guard against tag/binary drift: the binaries embed the workspace version, so it must equal
        # the tag (vX.Y.Z). The /release skill bumps Cargo.toml before tagging; this catches a miss.
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$ver" != "$tag" ]]; then
            echo "::error::workspace version $ver != tag $GITHUB_REF_NAME (bump Cargo.toml before tagging)"
            exit 1
          fi

      - name: Build
        # Builds the whole workspace: the cdylib (unseamless_coop.dll) and the launcher
        # (start_protected_game.exe).
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        # Assemble the drop-in install bundle: the cdylib renamed to dinput8.dll (the proxy name
        # the game auto-loads), our launcher, the README, and an empty mods/ for additional DLL mods.
        run: |
          out=target/x86_64-pc-windows-gnu/release
          zip="unseamless-coop-${GITHUB_REF_NAME}.zip"
          mkdir -p dist/mods
          cp "$out/unseamless_coop.dll" dist/dinput8.dll
          cp "$out/start_protected_game.exe" dist/start_protected_game.exe
          cp README.md dist/
          cat > dist/mods/README.txt <<'TXT'
          Drop additional simple DLL mods here; unseamless-coop (dinput8.dll) loads them on launch.
          Control load order with the [loader] order list in unseamless-coop/unseamless_coop.toml.
          TXT
          (cd dist && zip -r "../$zip" dinput8.dll start_protected_game.exe README.md mods)
          echo "ZIP=$zip" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag \
            --verify-tag \
            "$ZIP"
