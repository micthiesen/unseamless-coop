name: release

# Cut a release only when a version tag is pushed (not on every push).
# Create an annotated vX.Y.Z tag whose message becomes the release notes (--notes-from-tag).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Set up Rust toolchain
        # rust-toolchain.toml pins the channel; ensure the cross target is present.
        run: |
          rustup show
          rustup target add x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          dll=target/x86_64-pc-windows-gnu/release/unseamless_coop.dll
          zip="unseamless-coop-${GITHUB_REF_NAME}.zip"
          mkdir -p dist && cp "$dll" README.md dist/
          (cd dist && zip "../$zip" unseamless_coop.dll README.md)
          echo "DLL=$dll" >> "$GITHUB_ENV"
          echo "ZIP=$zip" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag \
            --verify-tag \
            "$ZIP" "$DLL"
